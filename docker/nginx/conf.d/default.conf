# CouponX — HTTP redirect + HTTPS reverse proxy to php-fpm.

server {
    listen 80;
    listen [::]:80;
    server_name couponx.deals www.couponx.deals;
    server_tokens off;

    # ACME http-01 challenge (Let's Encrypt)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://couponx.deals$request_uri;
    }
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name couponx.deals www.couponx.deals;
    server_tokens off;

    ssl_certificate     /etc/letsencrypt/live/couponx.deals/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/couponx.deals/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # Redirect the www host to the apex (served by the same cert request only for apex)
    if ($host = www.couponx.deals) {
        return 301 https://couponx.deals$request_uri;
    }

    root /var/www/html/public;
    index index.php;
    charset utf-8;
    client_max_body_size 20M;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }

    # Long-cache immutable build assets
    location /build/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    error_page 404 /index.php;

    location ~ \.php$ {
        fastcgi_pass app:9000;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param DOCUMENT_ROOT $realpath_root;
        include fastcgi_params;
        fastcgi_hide_header X-Powered-By;
        fastcgi_read_timeout 120;
    }

    # Deny dotfiles except the ACME challenge
    location ~ /\.(?!well-known).* {
        deny all;
    }
}
