name: couponx

services:
  app:
    build:
      context: .
      target: app
    image: couponx-app:latest
    restart: unless-stopped
    env_file: .env
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [couponx]

  queue:
    image: couponx-app:latest
    restart: unless-stopped
    env_file: .env
    command: php artisan queue:work --tries=3 --max-time=3600 --sleep=3
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [couponx]

  scheduler:
    image: couponx-app:latest
    restart: unless-stopped
    env_file: .env
    command: php artisan schedule:work
    volumes:
      - app-storage:/var/www/html/storage
    depends_on:
      app:
        condition: service_started
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks: [couponx]

  nginx:
    build:
      context: .
      target: nginx
    image: couponx-nginx:latest
    restart: unless-stopped
    command: /bin/sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - app-storage:/var/www/html/storage:ro
      - certbot-www:/var/www/certbot:ro
      - letsencrypt:/etc/letsencrypt:ro
    depends_on:
      app:
        condition: service_started
    networks: [couponx]

  mysql:
    image: mysql:8.0
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 30s
    networks: [couponx]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 12
    networks: [couponx]

  certbot:
    image: certbot/certbot
    restart: unless-stopped
    volumes:
      - certbot-www:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew --quiet; sleep 12h & wait $${!}; done;'"
    networks: [couponx]

volumes:
  mysql-data:
  redis-data:
  app-storage:
  certbot-www:
  letsencrypt:

networks:
  couponx:
    driver: bridge
